<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="status-row">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p class="value" id="best-score">0</p>
          </div>
          <div>
            <p class="label">State</p>
            <p class="value" id="game-state">Ready</p>
          </div>
        </div>

        <div class="board-wrap">
          <div
            id="board"
            class="board"
            role="application"
            aria-label="Snake game board"
            tabindex="0"
          ></div>
          <div class="overlay" id="overlay">
            <p id="overlay-title">Press any arrow key to start</p>
            <p id="overlay-copy">Use arrow keys or WASD. Press Space to pause.</p>
          </div>
        </div>

        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <p class="instructions">
          Move with Arrow keys or WASD. Eat food to grow. Avoid walls and your own tail.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
